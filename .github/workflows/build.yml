name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - run: npm ci

      - run: npm run lint

      - run: npm run build:typecheck

      - run: npm run build:ci

      - run: npm run test:ci

      - run: npm run test:e2e

      # Contract drift gate: the committed contracts file must match the DTO sources.
      - run: npm run emit:contracts && git diff --exit-code contracts/
